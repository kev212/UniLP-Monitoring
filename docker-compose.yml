services:
  guardian:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://unilp:unilp@postgres:5432/unilp
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - executor_private_key

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: unilp
      POSTGRES_USER: unilp
      POSTGRES_PASSWORD: unilp
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unilp -d unilp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:

secrets:
  executor_private_key:
    file: ./secrets/executor_private_key
