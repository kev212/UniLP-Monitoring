services:
  guardian:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - executor_private_key

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unilp -d unilp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:

secrets:
  executor_private_key:
    file: ${EXECUTOR_PRIVATE_KEY_FILE_HOST:?set EXECUTOR_PRIVATE_KEY_FILE_HOST}
